<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mahiru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Parisienne&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Message that fades in above the bouquet -->
    <div id="message">I miss you Mahiru</div>

    <!-- Main Interactive Scene -->
    <div class="scene-container">
        <div id="bouquet-scene" class="pulsing">
            <svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
                
                <!-- Wrapper (Back) -->
                <path d="M 150,280 L 350,280 L 310,560 C 290,590 210,590 190,560 Z" fill="#FFE4E1" stroke="#FFC0CB" stroke-width="2"/>
                <!-- Wrapper (Inner Shadow/Depth) -->
                <path d="M 170,280 L 330,280 L 295,540 C 280,560 220,560 205,540 Z" fill="#FFB6C1" opacity="0.5"/>

                <!-- ================= FLORA ================= -->

                <!-- 1. Sunflower (Back, Top Center) -->
                <g class="flower f1" transform="translate(250, 70)">
                    <path class="stem" d="M0,0 C 5,80 -5,160 0,240" stroke="#556b2f" stroke-width="5" fill="none" />
                    <path class="leaf" d="M0,60 C 40,50 60,70 50,100 C 30,90 0,80 0,60 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(0)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(30)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(60)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(90)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(120)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(150)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(180)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(210)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(240)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(270)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(300)"/>
                            <path d="M0,0 Q -10,-20 0,-50 Q 10,-20 0,0 Z" fill="#FFA500" transform="rotate(330)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(15)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(45)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(75)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(105)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(135)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(165)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(195)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(225)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(255)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(285)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(315)"/>
                            <path d="M0,0 Q -8,-15 0,-35 Q 8,-15 0,0 Z" fill="#FFD700" transform="rotate(345)"/>
                        </g>
                        <!-- Brown center removed as requested -->
                    </g>
                </g>

                <!-- 2. Tulip (Back Left) -->
                <g class="flower f2" transform="translate(190, 120) rotate(-15)">
                    <path class="stem" d="M0,0 C 10,50 -10,100 0,150" stroke="#556b2f" stroke-width="4" fill="none" />
                    <path class="leaf" d="M0,40 C 30,30 50,50 40,80 C 20,70 0,60 0,40 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -18,-25 -12,-65 Q 0,-80 12,-65 Q 18,-25 0,0 Z" fill="#FF6347" />
                            <path d="M0,0 Q -18,-25 -12,-65 Q 0,-80 12,-65 Q 18,-25 0,0 Z" fill="#FF7F50" transform="translate(-6, 5) rotate(-15)"/>
                            <path d="M0,0 Q -18,-25 -12,-65 Q 0,-80 12,-65 Q 18,-25 0,0 Z" fill="#FF7F50" transform="translate(6, 5) rotate(15)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 Q -10,-15 -5,-45 Q 0,-55 5,-45 Q 10,-15 0,0 Z" fill="#FF4500" transform="translate(0, -5)"/>
                        </g>
                        <circle cx="0" cy="-30" r="4" fill="none" class="flower-center"/>
                    </g>
                </g>

                <!-- 3. Tulip (Back Right) -->
                <g class="flower f2" transform="translate(310, 120) rotate(15)">
                    <path class="stem" d="M0,0 C -10,50 10,100 0,150" stroke="#556b2f" stroke-width="4" fill="none" />
                    <path class="leaf" d="M0,40 C -30,30 -50,50 -40,80 C -20,70 0,60 0,40 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -18,-25 -12,-65 Q 0,-80 12,-65 Q 18,-25 0,0 Z" fill="#FFC0CB" />
                            <path d="M0,0 Q -18,-25 -12,-65 Q 0,-80 12,-65 Q 18,-25 0,0 Z" fill="#FFB6C1" transform="translate(-6, 5) rotate(-15)"/>
                            <path d="M0,0 Q -18,-25 -12,-65 Q 0,-80 12,-65 Q 18,-25 0,0 Z" fill="#FFB6C1" transform="translate(6, 5) rotate(15)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 Q -10,-15 -5,-45 Q 0,-55 5,-45 Q 10,-15 0,0 Z" fill="#FF91A4" transform="translate(0, -5)"/>
                        </g>
                        <circle cx="0" cy="-30" r="4" fill="none" class="flower-center"/>
                    </g>
                </g>

                <!-- 4. Lily (Mid Center) -->
                <g class="flower f3" transform="translate(250, 140) rotate(5)">
                    <path class="stem" d="M0,0 C -5,50 5,100 0,150" stroke="#556b2f" stroke-width="4" fill="none" />
                    <path class="leaf" d="M0,30 C -30,20 -50,40 -40,70 C -20,60 0,50 0,30 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 C -10,-20 -15,-50 -5,-75 C 0,-80 5,-80 10,-75 C 15,-50 10,-20 0,0 Z" fill="#FFFFFF" transform="rotate(0)"/>
                            <path d="M0,0 C -10,-20 -15,-50 -5,-75 C 0,-80 5,-80 10,-75 C 15,-50 10,-20 0,0 Z" fill="#FFFFFF" transform="rotate(60)"/>
                            <path d="M0,0 C -10,-20 -15,-50 -5,-75 C 0,-80 5,-80 10,-75 C 15,-50 10,-20 0,0 Z" fill="#FFFFFF" transform="rotate(120)"/>
                            <path d="M0,0 C -10,-20 -15,-50 -5,-75 C 0,-80 5,-80 10,-75 C 15,-50 10,-20 0,0 Z" fill="#FFFFFF" transform="rotate(180)"/>
                            <path d="M0,0 C -10,-20 -15,-50 -5,-75 C 0,-80 5,-80 10,-75 C 15,-50 10,-20 0,0 Z" fill="#FFFFFF" transform="rotate(240)"/>
                            <path d="M0,0 C -10,-20 -15,-50 -5,-75 C 0,-80 5,-80 10,-75 C 15,-50 10,-20 0,0 Z" fill="#FFFFFF" transform="rotate(300)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 C -8,-15 -12,-35 -4,-55 C 0,-60 4,-60 8,-55 C 12,-35 8,-15 0,0 Z" fill="#FFE6EA" transform="rotate(30)"/>
                            <path d="M0,0 C -8,-15 -12,-35 -4,-55 C 0,-60 4,-60 8,-55 C 12,-35 8,-15 0,0 Z" fill="#FFE6EA" transform="rotate(90)"/>
                            <path d="M0,0 C -8,-15 -12,-35 -4,-55 C 0,-60 4,-60 8,-55 C 12,-35 8,-15 0,0 Z" fill="#FFE6EA" transform="rotate(150)"/>
                            <path d="M0,0 C -8,-15 -12,-35 -4,-55 C 0,-60 4,-60 8,-55 C 12,-35 8,-15 0,0 Z" fill="#FFE6EA" transform="rotate(210)"/>
                            <path d="M0,0 C -8,-15 -12,-35 -4,-55 C 0,-60 4,-60 8,-55 C 12,-35 8,-15 0,0 Z" fill="#FFE6EA" transform="rotate(270)"/>
                            <path d="M0,0 C -8,-15 -12,-35 -4,-55 C 0,-60 4,-60 8,-55 C 12,-35 8,-15 0,0 Z" fill="#FFE6EA" transform="rotate(330)"/>
                        </g>
                        <circle cx="0" cy="-30" r="6" fill="#FFD700" class="flower-center"/>
                    </g>
                </g>

                <!-- 5. Rose (Center, Deep Red) -->
                <g class="flower f3" transform="translate(250, 160)">
                    <path class="stem" d="M0,0 C -10,50 10,100 0,120" stroke="#556b2f" stroke-width="4" fill="none" />
                    <path class="leaf" d="M0,40 C 30,30 50,50 40,80 C 20,70 0,60 0,40 Z" fill="#6b8e23" />
                    <path class="leaf" d="M0,70 C -30,60 -50,80 -40,110 C -20,100 0,90 0,70 Z" fill="#556b2f" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -18,-25 -8,-60 Q 0,-70 8,-60 Q 18,-25 0,0 Z" fill="#ff4d4d" transform="rotate(0)"/>
                            <path d="M0,0 Q -18,-25 -8,-60 Q 0,-70 8,-60 Q 18,-25 0,0 Z" fill="#ff4d4d" transform="rotate(72)"/>
                            <path d="M0,0 Q -18,-25 -8,-60 Q 0,-70 8,-60 Q 18,-25 0,0 Z" fill="#ff4d4d" transform="rotate(144)"/>
                            <path d="M0,0 Q -18,-25 -8,-60 Q 0,-70 8,-60 Q 18,-25 0,0 Z" fill="#ff4d4d" transform="rotate(216)"/>
                            <path d="M0,0 Q -18,-25 -8,-60 Q 0,-70 8,-60 Q 18,-25 0,0 Z" fill="#ff4d4d" transform="rotate(288)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 Q -12,-15 -5,-40 Q 0,-48 5,-40 Q 12,-15 0,0 Z" fill="#cc0000" transform="rotate(36)"/>
                            <path d="M0,0 Q -12,-15 -5,-40 Q 0,-48 5,-40 Q 12,-15 0,0 Z" fill="#cc0000" transform="rotate(108)"/>
                            <path d="M0,0 Q -12,-15 -5,-40 Q 0,-48 5,-40 Q 12,-15 0,0 Z" fill="#cc0000" transform="rotate(180)"/>
                            <path d="M0,0 Q -12,-15 -5,-40 Q 0,-48 5,-40 Q 12,-15 0,0 Z" fill="#cc0000" transform="rotate(252)"/>
                            <path d="M0,0 Q -12,-15 -5,-40 Q 0,-48 5,-40 Q 12,-15 0,0 Z" fill="#cc0000" transform="rotate(324)"/>
                        </g>
                        <circle cx="0" cy="-15" r="6" fill="#ffcc00" class="flower-center"/>
                    </g>
                </g>

                <!-- 6. Rose (Left, Soft Pink) -->
                <g class="flower f3" transform="translate(160, 180) rotate(-20)">
                    <path class="stem" d="M0,0 C 15,40 -5,80 10,100" stroke="#556b2f" stroke-width="4" fill="none" />
                    <path class="leaf" d="M0,30 C -25,20 -45,40 -35,70 C -15,60 0,50 0,30 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -15,-20 -7,-50 Q 0,-60 7,-50 Q 15,-20 0,0 Z" fill="#ffc0cb" transform="rotate(0)"/>
                            <path d="M0,0 Q -15,-20 -7,-50 Q 0,-60 7,-50 Q 15,-20 0,0 Z" fill="#ffc0cb" transform="rotate(72)"/>
                            <path d="M0,0 Q -15,-20 -7,-50 Q 0,-60 7,-50 Q 15,-20 0,0 Z" fill="#ffc0cb" transform="rotate(144)"/>
                            <path d="M0,0 Q -15,-20 -7,-50 Q 0,-60 7,-50 Q 15,-20 0,0 Z" fill="#ffc0cb" transform="rotate(216)"/>
                            <path d="M0,0 Q -15,-20 -7,-50 Q 0,-60 7,-50 Q 15,-20 0,0 Z" fill="#ffc0cb" transform="rotate(288)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 Q -10,-12 -4,-35 Q 0,-42 4,-35 Q 10,-12 0,0 Z" fill="#ff91a4" transform="rotate(36)"/>
                            <path d="M0,0 Q -10,-12 -4,-35 Q 0,-42 4,-35 Q 10,-12 0,0 Z" fill="#ff91a4" transform="rotate(108)"/>
                            <path d="M0,0 Q -10,-12 -4,-35 Q 0,-42 4,-35 Q 10,-12 0,0 Z" fill="#ff91a4" transform="rotate(180)"/>
                            <path d="M0,0 Q -10,-12 -4,-35 Q 0,-42 4,-35 Q 10,-12 0,0 Z" fill="#ff91a4" transform="rotate(252)"/>
                            <path d="M0,0 Q -10,-12 -4,-35 Q 0,-42 4,-35 Q 10,-12 0,0 Z" fill="#ff91a4" transform="rotate(324)"/>
                        </g>
                        <circle cx="0" cy="-12" r="5" fill="#ffcc00" class="flower-center"/>
                    </g>
                </g>

                <!-- 7. Rose (Right, White/Pink) -->
                <g class="flower f3" transform="translate(340, 180) rotate(20)">
                    <path class="stem" d="M0,0 C -15,40 5,80 -10,100" stroke="#556b2f" stroke-width="4" fill="none" />
                    <path class="leaf" d="M0,30 C 25,20 45,40 35,70 C 15,60 0,50 0,30 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -16,-22 -8,-55 Q 0,-65 8,-55 Q 16,-22 0,0 Z" fill="#ffffff" transform="rotate(0)"/>
                            <path d="M0,0 Q -16,-22 -8,-55 Q 0,-65 8,-55 Q 16,-22 0,0 Z" fill="#ffffff" transform="rotate(72)"/>
                            <path d="M0,0 Q -16,-22 -8,-55 Q 0,-65 8,-55 Q 16,-22 0,0 Z" fill="#ffffff" transform="rotate(144)"/>
                            <path d="M0,0 Q -16,-22 -8,-55 Q 0,-65 8,-55 Q 16,-22 0,0 Z" fill="#ffffff" transform="rotate(216)"/>
                            <path d="M0,0 Q -16,-22 -8,-55 Q 0,-65 8,-55 Q 16,-22 0,0 Z" fill="#ffffff" transform="rotate(288)"/>
                        </g>
                        <g class="petal-inner-group">
                            <path d="M0,0 Q -11,-14 -5,-38 Q 0,-46 5,-38 Q 11,-14 0,0 Z" fill="#ffe6ea" transform="rotate(36)"/>
                            <path d="M0,0 Q -11,-14 -5,-38 Q 0,-46 5,-38 Q 11,-14 0,0 Z" fill="#ffe6ea" transform="rotate(108)"/>
                            <path d="M0,0 Q -11,-14 -5,-38 Q 0,-46 5,-38 Q 11,-14 0,0 Z" fill="#ffe6ea" transform="rotate(180)"/>
                            <path d="M0,0 Q -11,-14 -5,-38 Q 0,-46 5,-38 Q 11,-14 0,0 Z" fill="#ffe6ea" transform="rotate(252)"/>
                            <path d="M0,0 Q -11,-14 -5,-38 Q 0,-46 5,-38 Q 11,-14 0,0 Z" fill="#ffe6ea" transform="rotate(324)"/>
                        </g>
                        <circle cx="0" cy="-14" r="5" fill="#ffcc00" class="flower-center"/>
                    </g>
                </g>

                <!-- 8. Daisy (Front Left) -->
                <g class="flower f4" transform="translate(200, 210) rotate(10)">
                    <path class="stem" d="M0,0 C -5,50 5,100 0,150" stroke="#556b2f" stroke-width="3" fill="none" />
                    <path class="leaf" d="M0,40 C 25,30 45,50 35,80 C 15,70 0,60 0,40 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(0)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(45)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(90)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(135)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(180)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(225)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(270)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(315)"/>
                        </g>
                        <circle cx="0" cy="-18" r="8" fill="#FFD700" class="flower-center"/>
                    </g>
                </g>

                <!-- 9. Daisy (Front Right) -->
                <g class="flower f4" transform="translate(300, 210) rotate(-10)">
                    <path class="stem" d="M0,0 C 5,50 -5,100 0,150" stroke="#556b2f" stroke-width="3" fill="none" />
                    <path class="leaf" d="M0,40 C -25,30 -45,50 -35,80 C -15,70 0,60 0,40 Z" fill="#6b8e23" />
                    <g class="petals">
                        <g class="petal-outer-group">
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(0)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(45)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(90)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(135)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(180)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(225)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(270)"/>
                            <path d="M0,0 Q -6,-15 -2,-35 Q 0,-40 2,-35 Q 6,-15 0,0 Z" fill="#FFFFFF" transform="rotate(315)"/>
                        </g>
                        <circle cx="0" cy="-18" r="8" fill="#FFD700" class="flower-center"/>
                    </g>
                </g>

                <!-- ================= FLORA END ================= -->

                <!-- Wrapper (Front Tie) - Drawn last so it overlaps the stems -->
                <path d="M 165,290 Q 250,270 335,290 L 325,310 Q 250,295 175,310 Z" fill="#FF69B4" />
                <ellipse cx="250" cy="290" rx="85" ry="14" fill="#FF1493" opacity="0.8"/>

            </svg>
        </div>
        <div id="click-hint">Click Me</div>
    </div>

    <!-- Container for floating hearts and sparkles -->
    <div id="particles"></div>

    <script src="script.js"></script>
</body>
</html>
